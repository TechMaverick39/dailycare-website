<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Daily Care Hub Nepal</title>
  
  <meta name="robots" content="noindex, follow">
  
  <!-- GOOGLE FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body class="error-page">

  <!-- DYNAMIC CURSOR GLOW -->
  <div class="cursor-glow" id="error-glow"></div>

  <div class="error-container">
    <div class="error-code">404</div>
    <h1>Oops! Page Not Found</h1>
    <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable. Let's get you back on track.</p>
    <a href="index.html" class="btn">Back to Homepage</a>
  </div>

  <script>
    // Cursor glow tracker for error page
    const glow = document.getElementById("error-glow");
    if (glow) {
      document.addEventListener("mousemove", (e) => {
        glow.style.left = e.clientX + "px";
        glow.style.top = e.clientY + "px";
      });
    }
  </script>
</body>
</html>
